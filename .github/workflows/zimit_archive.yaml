name: Zimit Website Archiver

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'URL of the website to archive'
        required: true
        type: string
      output_directory:
        description: 'Directory to save the ZIM file (e.g., output/)'
        required: false
        default: 'output/'
        type: string
      zimit_options:
        description: 'Additional options for zimit command (e.g., --name "My Archive")'
        required: false
        default: ''
        type: string

jobs:
  archive_website:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back to the repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Set up Docker
        run: |
          # Install dependencies
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg lsb-release

          # Add Docker's official GPG key
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add Docker repository
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          # Update package index
          sudo apt-get update

          # Fix conflict: Remove base containerd if present, then install containerd.io
          sudo apt-get install -y --allow-downgrades containerd.io=1.7.* || true
          
          # Start Docker daemon
          sudo dockerd &
          # Wait for docker to be ready
          sleep 3

      - name: Pull Zimit Docker image
        run: docker pull openzim/zimit:latest

      - name: Run Zimit to create ZIM file
        id: run_zimit
        run: |
          set -e
          WEBSITE_URL="${{ github.event.inputs.website_url }}"
          OUTPUT_DIR="${{ github.event.inputs.output_directory }}"
          ZIMIT_OPTIONS="${{ github.event.inputs.zimit_options }}"

          # Sanitize URL for filename
          SANITIZED_NAME=$(echo "$WEBSITE_URL" | sed 's#^https\?://##' | sed 's#/#_#g' | sed 's/[^a-zA-Z0-9_-]/_/g')
          FILE_NAME="${SANITIZED_NAME}_$(date +'%Y-%m').zim"

          # Ensure output directory exists
          mkdir -p "$OUTPUT_DIR"

          echo "Running Zimit for website: $WEBSITE_URL"
          echo "Output file: $OUTPUT_DIR/$FILE_NAME"

          # Run Zimit
          docker run --rm \
            -v ${{ github.workspace }}:/github/workspace \
            -w /github/workspace \
            openzim/zimit:latest \
            --seeds "$WEBSITE_URL" \
            --name "$FILE_NAME" \
            --output "$OUTPUT_DIR" \
            --pageLimit 1000 \
            $ZIMIT_OPTIONS

          echo "Zimit process finished."

      - name: Find the generated ZIM file
        id: find_zim
        run: |
          WEBSITE_URL="${{ github.event.inputs.website_url }}"
          OUTPUT_DIR="${{ github.event.inputs.output_directory }}"
          
          # Sanitize URL for filename to match the one created in the previous step
          SANITIZED_NAME=$(echo "$WEBSITE_URL" | sed 's#^https\?://##' | sed 's#/#_#g' | sed 's/[^a-zA-Z0-9_-]/_/g')
          EXPECTED_FILE="${SANITIZED_NAME}_$(date +'%Y-%m').zim"
          EXPECTED_PATH="${OUTPUT_DIR}/${EXPECTED_FILE}"

          if [ -f "$EXPECTED_PATH" ]; then
            echo "Found ZIM file: $EXPECTED_PATH"
            echo "zim_file_path=$EXPECTED_PATH" >> $GITHUB_OUTPUT
            echo "zim_file_name=$(basename $EXPECTED_PATH)" >> $GITHUB_OUTPUT
          else
            # Fallback: Try to find any .zim file if the name didn't match exactly
            ZIM_FILE_PATH=$(find "$OUTPUT_DIR" -maxdepth 1 -name "*.zim" -print -quit)
            if [ -n "$ZIM_FILE_PATH" ]; then
              echo "Found ZIM file (fallback): $ZIM_FILE_PATH"
              echo "zim_file_path=$ZIM_FILE_PATH" >> $GITHUB_OUTPUT
              echo "zim_file_name=$(basename $ZIM_FILE_PATH)" >> $GITHUB_OUTPUT
            else
              echo "Error: No .zim file found in '$OUTPUT_DIR' after Zimit run."
              exit 1
            fi
          fi

      - name: Commit and push ZIM file
        run: |
          ZIM_FILE_PATH="${{ steps.find_zim.outputs.zim_file_path }}"
          ZIM_FILE_NAME="${{ steps.find_zim.outputs.zim_file_name }}"
          WEBSITE_URL="${{ github.event.inputs.website_url }}"

          echo "Adding ZIM file to Git staging area: $ZIM_FILE_PATH"
          git add "$ZIM_FILE_PATH"

          if git diff --staged --quiet; then
            echo "No new changes to commit. The ZIM file may already be up-to-date."
          else
            COMMIT_MESSAGE="Automated ZIM archive of $WEBSITE_URL (File: $ZIM_FILE_NAME)"
            echo "Committing changes with message: '$COMMIT_MESSAGE'"
            git commit -m "$COMMIT_MESSAGE"

            # Determine the branch name safely
            BRANCH_NAME=${{ github.head_ref || github.ref_name || 'main' }}
            
            echo "Pushing changes to origin/$BRANCH_NAME..."
            git push origin HEAD:$BRANCH_NAME
            
            echo "Successfully committed and pushed '$ZIM_FILE_NAME'."
          fi
