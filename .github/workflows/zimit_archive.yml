name: Zimit Website Archiver

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'The URL of the website to archive'
        required: true
      zim_file_name:
        description: 'Name for the ZIM file (e.g., mywebsite_archive)'
        required: true
      # We will remove the repo_token input from here as GITHUB_TOKEN is automatically available
      # repo_token:
      #   description: 'GitHub token for pushing to the repository'
      #   required: true
      #   type: string
      #   default: ${{ secrets.GITHUB_TOKEN }}

jobs:
  archive_website:
    runs-on: ubuntu-latest
    permissions: # Add this block
      contents: write # This grants write access to the repository contents
      # You might also need packages: write if you were publishing to GHCR,
      # but for pushing to the repo, 'contents: write' is key.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        # No need for token input here if using default GITHUB_TOKEN with write permissions
        # with:
        #   token: ${{ inputs.repo_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run Zimit to create ZIM file
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/output:/output \
            ghcr.io/openzim/zimit \
            zimit --seeds ${{ github.event.inputs.website_url }} \
            --name ${{ github.event.inputs.zim_file_name }} \
            --output /output \
            --pageLimit 1000 # Adjust pageLimit as needed

      - name: Upload ZIM file artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.event.inputs.zim_file_name }}.zim
          path: output/${{ github.event.inputs.zim_file_name }}.zim

      - name: Commit and push ZIM file
        run: |
          cd output
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ${{ github.event.inputs.zim_file_name }}.zim
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated ZIM archive of ${{ github.event.inputs.website_url }}"
            git push origin HEAD:${{ github.ref_name }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This env var is automatically available
