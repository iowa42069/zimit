name: Zimit Website Archiver (Flexible Naming)

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'The URL of the website to archive'
        required: true
      # No need for a specific ZIM file name input anymore

jobs:
  archive_website:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run Zimit to create ZIM file
        id: zimit_run
        run: |
          echo "::group::Zimit Docker Run Output"
          docker run --rm \
            -v ${{ github.workspace }}/output:/output \
            ghcr.io/openzim/zimit \
            zimit --seeds ${{ github.event.inputs.website_url }} \
            --name zimit_generated # Using a generic name, Zimit might still append date/time
            --output /output \
            --pageLimit 1000
          echo "::endgroup::"

      - name: Find the generated ZIM file
        id: find_zim
        run: |
          echo "::group::Contents of the output directory:"
          ls -l ${{ github.workspace }}/output
          echo "::endgroup::"

          # Find the first .zim file in the output directory
          ZIM_FILE=$(find ${{ github.workspace }}/output -maxdepth 1 -name "*.zim" -print -quit)

          if [ -z "$ZIM_FILE" ]; then
            echo "Error: No .zim file found in the output directory."
            exit 1
          fi

          echo "Found ZIM file: $ZIM_FILE"
          # Extract just the filename for artifact upload and commit
          FILENAME=$(basename "$ZIM_FILE")
          echo "::set-output name=zim_file_path::$ZIM_FILE"
          echo "::set-output name=zim_file_name::$FILENAME"

      - name: Upload ZIM file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_zim.outputs.zim_file_name }} # Use the found filename
          path: ${{ steps.find_zim.outputs.zim_file_path }} # Use the found full path

      - name: Commit and push ZIM file
        run: |
          ZIM_FILE_PATH="${{ steps.find_zim.outputs.zim_file_path }}"
          ZIM_FILE_NAME="${{ steps.find_zim.outputs.zim_file_name }}"

          if [ ! -f "$ZIM_FILE_PATH" ]; then
            echo "Error: ZIM file '$ZIM_FILE_PATH' not found."
            exit 1
          fi

          echo "Preparing to commit and push: $ZIM_FILE_NAME"
          cd ${{ github.workspace }} # Ensure we are in the root of the workspace for git commands
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

          # Add the specific file found
          git add "$ZIM_FILE_PATH"

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated ZIM archive of ${{ github.event.inputs.website_url }} (File: $ZIM_FILE_NAME)"
            git push origin HEAD:${{ github.ref_name }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
