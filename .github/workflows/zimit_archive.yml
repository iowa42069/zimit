name: Zimit Website Archiver

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'The URL of the website to archive'
        required: true
      zim_file_name:
        description: 'Name for the ZIM file (e.g., mywebsite_archive)'
        required: true

jobs:
  archive_website:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run Zimit to create ZIM file
        id: zimit_run # Give this step an ID to reference its output later
        run: |
          echo "::group::Zimit Docker Run Output"
          docker run --rm \
            -v ${{ github.workspace }}/output:/output \
            ghcr.io/openzim/zimit \
            zimit --seeds ${{ github.event.inputs.website_url }} \
            --name ${{ github.event.inputs.zim_file_name }} \
            --output /output \
            --pageLimit 1000 # Adjust pageLimit as needed
          echo "::endgroup::"

      - name: List files in output directory
        run: |
          echo "::group::Contents of the output directory:"
          ls -l ${{ github.workspace }}/output
          echo "::endgroup::"

      - name: Upload ZIM file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zim_file_name }}.zim
          path: output/${{ github.event.inputs.zim_file_name }}.zim

      - name: Commit and push ZIM file
        run: |
          cd output
          # Construct the expected file name
          ZIM_FILE="${{ github.event.inputs.zim_file_name }}.zim"

          # Check if the file exists before attempting to add and commit
          if [ ! -f "$ZIM_FILE" ]; then
            echo "Error: ZIM file '$ZIM_FILE' not found in the output directory."
            echo "Contents of output directory:"
            ls -l
            exit 1 # Exit with an error code
          fi

          echo "Found ZIM file: $ZIM_FILE"
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add "$ZIM_FILE"

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated ZIM archive of ${{ github.event.inputs.website_url }}"
            git push origin HEAD:${{ github.ref_name }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
